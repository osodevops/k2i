services:
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    hostname: kafka
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:29092", "--list"]
      interval: 5s
      timeout: 10s
      retries: 30

  kafka-init:
    image: confluentinc/cp-kafka:7.7.1
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - bash
      - -lc
      - |
        kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic f1.timing.derived_state \
          --partitions 1 \
          --replication-factor 1

  backfill-init:
    build:
      context: ../..
      dockerfile: docker/e2e/runner.Dockerfile
    environment:
      K2I_E2E_MODE: backfill-init
      K2I_E2E_CONFIG: /etc/k2i/config.toml
      K2I_E2E_HISTORICAL_DIR: /historical
      K2I_E2E_DATABASE: f1
      K2I_E2E_TABLE: derived_state
    volumes:
      - ./k2i.backfill.toml:/etc/k2i/config.toml:ro
      - k2i-warehouse:/var/lib/k2i/warehouse
      - k2i-catalog:/var/lib/k2i/catalog
      - k2i-txlog:/var/lib/k2i/txlog
      - k2i-historical:/historical

  k2i:
    build:
      context: ../..
      dockerfile: Dockerfile
    user: "0:0"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      backfill-init:
        condition: service_completed_successfully
    environment:
      RUST_LOG: info
    volumes:
      - ./k2i.backfill.toml:/etc/k2i/config.toml:ro
      - k2i-warehouse:/var/lib/k2i/warehouse
      - k2i-catalog:/var/lib/k2i/catalog
      - k2i-txlog:/var/lib/k2i/txlog
      - k2i-run:/var/run/k2i
      - k2i-historical:/historical
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 2s
      timeout: 3s
      retries: 60

  e2e-runner:
    build:
      context: ../..
      dockerfile: docker/e2e/runner.Dockerfile
    depends_on:
      k2i:
        condition: service_healthy
    environment:
      K2I_E2E_MODE: backfill-verify
      K2I_E2E_RPC_SOCKET: /var/run/k2i/k2i.sock
      RUST_LOG: info
    volumes:
      - k2i-run:/var/run/k2i
      - k2i-historical:/historical

volumes:
  k2i-warehouse:
  k2i-catalog:
  k2i-txlog:
  k2i-run:
  k2i-historical:
